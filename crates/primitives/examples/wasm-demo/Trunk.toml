# nectar/crates/primitives/examples/wasm-demo/Trunk.toml
[build]
# Build in release mode by default
release = true
# The HTML file to use as entry point
target = "index.html"
# Output directory (created automatically)
dist = "dist"
# Leave wasm-opt disabled: binaryen must run with --enable-threads to accept the
# shared-memory threaded module, and that is not wired into the Pages workflow.
# Size optimization comes from the workspace-root release profile instead.
wasm_opt = false

public_url = "/"
filehash = false
# inject_scripts = false  # This matches your current config
offline = false
frozen = false
locked = false
minify = "never"
no_sri = false

[watch]
# Watch these directories for changes during 'trunk serve'
watch = ["src/", "js/"]

[serve]
port = 8080
open = true
