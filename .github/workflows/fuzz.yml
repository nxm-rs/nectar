# Fuzzes the wire-format decoders. Targets build once under nightly plus the
# sanitizer; each run job then executes the prebuilt binary, so nothing is
# rebuilt and the run jobs need no toolchain.
name: fuzz

on:
    pull_request:
    merge_group:
    push:
        branches: [main]
    schedule:
        - cron: "40 3 * * *"

env:
    CARGO_TERM_COLOR: always
    TRIPLE: x86_64-unknown-linux-gnu

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    build:
        name: fuzz build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
              with:
                  toolchain: nightly
                  components: rust-src
            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
              with:
                  workspaces: fuzz
                  cache-on-failure: true
            - uses: taiki-e/install-action@1b57bc699ba2af96a06eb2a2a0d32b43a7d8e8b8  # v2
              with:
                  tool: cargo-fuzz@0.13.1
            - name: Build fuzz targets
              run: cargo +nightly fuzz build --target "$TRIPLE"
            - name: Stage binaries
              run: |
                  mkdir -p fuzz-bin
                  for t in $(cargo fuzz list); do
                      cp "fuzz/target/$TRIPLE/release/$t" fuzz-bin/
                  done
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
              with:
                  name: fuzz-bin
                  path: fuzz-bin
                  retention-days: 1

    smoke:
        name: fuzz smoke / ${{ matrix.target }}
        if: github.event_name != 'schedule'
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 10
        strategy:
            fail-fast: false
            matrix:
                target:
                    - mantaray_node_decode
                    - chunk_decode
                    - stamp_decode
                    - usage_snapshot_decode
                    - mantaray_node_roundtrip
                    - chunk_roundtrip
                    - stamp_roundtrip
                    - usage_snapshot_roundtrip
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
              with:
                  name: fuzz-bin
                  path: fuzz-bin
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
              with:
                  path: fuzz/corpus/${{ matrix.target }}
                  key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
                  restore-keys: |
                      fuzz-corpus-${{ matrix.target }}-
            - name: Run ${{ matrix.target }} for 60s
              run: |
                  chmod +x "fuzz-bin/${{ matrix.target }}"
                  mkdir -p "fuzz/corpus/${{ matrix.target }}" fuzz/artifacts
                  seeds="fuzz/seeds/${{ matrix.target }}"
                  [ -d "$seeds" ] || seeds=""
                  "$PWD/fuzz-bin/${{ matrix.target }}" \
                    "fuzz/corpus/${{ matrix.target }}" $seeds \
                    -max_total_time=60 -rss_limit_mb=2048 -artifact_prefix=fuzz/artifacts/
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
              if: failure()
              with:
                  name: fuzz-artifacts-${{ matrix.target }}
                  path: fuzz/artifacts
                  if-no-files-found: ignore

    cron:
        name: fuzz nightly / ${{ matrix.target }}
        if: github.event_name == 'schedule'
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                target:
                    - mantaray_node_decode
                    - chunk_decode
                    - stamp_decode
                    - usage_snapshot_decode
                    - mantaray_node_roundtrip
                    - chunk_roundtrip
                    - stamp_roundtrip
                    - usage_snapshot_roundtrip
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
              with:
                  name: fuzz-bin
                  path: fuzz-bin
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
              with:
                  path: fuzz/corpus/${{ matrix.target }}
                  key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
                  restore-keys: |
                      fuzz-corpus-${{ matrix.target }}-
            - name: Run ${{ matrix.target }} for 10 minutes and minimise
              run: |
                  bin="$PWD/fuzz-bin/${{ matrix.target }}"
                  chmod +x "$bin"
                  corpus="fuzz/corpus/${{ matrix.target }}"
                  mkdir -p "$corpus" fuzz/artifacts
                  seeds="fuzz/seeds/${{ matrix.target }}"
                  [ -d "$seeds" ] || seeds=""
                  "$bin" "$corpus" $seeds -max_total_time=600 -rss_limit_mb=2048 -artifact_prefix=fuzz/artifacts/
                  min=$(mktemp -d)
                  "$bin" -merge=1 "$min" "$corpus"
                  rm -rf "$corpus"; mkdir -p "$corpus"; cp -a "$min"/. "$corpus"/ 2>/dev/null || true
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
              if: failure()
              with:
                  name: fuzz-artifacts-nightly-${{ matrix.target }}
                  path: fuzz/artifacts
                  if-no-files-found: ignore
