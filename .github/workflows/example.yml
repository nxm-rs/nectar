name: Deploy WASM Demo to GitHub Pages

on:
    push:
        branches: [main]
        paths:
            - "crates/primitives/examples/wasm-demo/**"
            - "crates/primitives/src/**"
    workflow_dispatch: # Allow manual triggering

env:
    CARGO_TERM_COLOR: always

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

            - name: Install Rust nightly
              uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
              with:
                  targets: wasm32-unknown-unknown
                  components: rust-src

            - name: Cache Rust dependencies
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
              with:
                  shared-key: "wasm-demo"

            - name: Install Trunk
              uses: jetli/trunk-action@68dbd78ba531c95d8ce3d262c9e63291926e9353  # v0.4.0
              with:
                  version: "latest"

            - name: Build WASM Demo
              run: |
                  cd crates/primitives/examples/wasm-demo
                  RUSTUP_TOOLCHAIN=nightly trunk build --release --public-url /nectar/

            - name: Deploy to GitHub Pages
              uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f  # v4.8.0
              with:
                  folder: crates/primitives/examples/wasm-demo/dist
                  branch: gh-pages
                  clean: true
