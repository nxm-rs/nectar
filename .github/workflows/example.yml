name: Deploy WASM Demo to GitHub Pages

on:
    push:
        branches: [main]
        paths:
            - "crates/primitives/examples/wasm-demo/**"
            - "crates/primitives/src/**"
    workflow_dispatch: # Allow manual triggering

env:
    CARGO_TERM_COLOR: always

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

            - uses: ./.github/actions/rust-setup
              with:
                  targets: wasm32-unknown-unknown

            - name: Install Trunk
              uses: jetli/trunk-action@1346cc09eace4beb84e403e199a471346d4684c9  # v0.5.1
              with:
                  version: "latest"

            - name: Build WASM Demo
              run: |
                  cd crates/primitives/examples/wasm-demo
                  trunk build --release --public-url /nectar/

            - name: Deploy to GitHub Pages
              uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f  # v4.8.0
              with:
                  folder: crates/primitives/examples/wasm-demo/dist
                  branch: gh-pages
                  clean: true
