name: Deploy WASM Demo to GitHub Pages

on:
    push:
        branches: [main]
        paths:
            - "crates/primitives/examples/wasm-demo/**"
            - "crates/primitives/src/**"
    workflow_dispatch: # Allow manual triggering

env:
    CARGO_TERM_COLOR: always

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust nightly
              uses: dtolnay/rust-toolchain@nightly
              with:
                  targets: wasm32-unknown-unknown
                  components: rust-src

            - name: Cache Rust dependencies
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: "wasm-demo"

            - name: Install Trunk
              uses: jetli/trunk-action@v0.4.0
              with:
                  version: "latest"

            - name: Build WASM Demo
              run: |
                  cd crates/primitives/examples/wasm-demo
                  RUSTUP_TOOLCHAIN=nightly trunk build --release --public-url /nectar/

            - name: Deploy to GitHub Pages
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  folder: crates/primitives/examples/wasm-demo/dist
                  branch: gh-pages
                  clean: true
