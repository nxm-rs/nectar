# Runs unit, integration and doc tests.
name: unit

on:
    pull_request:
    merge_group:
    push:
        branches: [main]

env:
    CARGO_TERM_COLOR: always

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    test:
        name: test / swarm
        runs-on: ubuntu-latest
        env:
            RUST_BACKTRACE: 1
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
            # mold is symlinked as `ld`, NOT put in RUSTFLAGS: it keeps linking
            # fast (which sccache cannot cache anyway) without a linker flag in
            # the compile cache key.
            - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
            - uses: ./.github/actions/rust-setup
            - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
              with:
                  tool: nextest
            - name: Run tests
              run: |
                  cargo nextest run \
                    --workspace --locked \
                    --no-tests=warn --no-fail-fast
            # nextest does not run doctests; cover them here on the warm target
            # dir rather than in a separate job that rebuilds the workspace.
            - name: Run doctests
              run: cargo test --doc --workspace --locked
            # The async io adapters are feature-gated off the default build;
            # cover their tests and the range-request doctest here.
            - name: Run tokio adapter tests
              run: |
                  cargo nextest run \
                    -p nectar-file --features tokio --locked \
                    --no-tests=warn --no-fail-fast
            - name: Run tokio adapter doctests
              run: cargo test --doc -p nectar-file --features tokio --locked
            # The batch ingest is likewise feature-gated off the default
            # build; cover its tests and doctest here, with the encrypted
            # mode enabled so the pooled encrypted ingest runs too.
            - name: Run rayon ingest tests
              run: |
                  cargo nextest run \
                    -p nectar-file --features rayon,encryption --locked \
                    --no-tests=warn --no-fail-fast
            - name: Run rayon ingest doctests
              run: cargo test --doc -p nectar-file --features rayon,encryption --locked
            # The file-pipeline integration tests gate their rayon suites
            # behind the dev crate's forwarding feature of the same name.
            - name: Run rayon ingest integration tests
              run: |
                  cargo nextest run \
                    -p nectar-integration-tests --features rayon,encryption --locked \
                    --no-tests=warn --no-fail-fast
            # The encrypted split mode sits behind the encryption feature;
            # cover its tests and doctest here.
            - name: Run encrypted split tests
              run: |
                  cargo nextest run \
                    -p nectar-file --features encryption --locked \
                    --no-tests=warn --no-fail-fast
            - name: Run encrypted split doctests
              run: cargo test --doc -p nectar-file --features encryption --locked
            # The encrypted allocation probes must see encryption without
            # rayon, matching the encrypted split shape above.
            - name: Run encrypted split integration tests
              run: |
                  cargo nextest run \
                    -p nectar-integration-tests --features encryption --locked \
                    --no-tests=warn --no-fail-fast
            # The issuer integration surface is feature-gated off the default
            # build; cover its tests here.
            - name: Run issuer tests
              run: |
                  cargo nextest run \
                    -p nectar-postage-usage --features issuer --locked \
                    --no-tests=warn --no-fail-fast
            # The seal and issuer integration suites ride the dev crate's
            # forwarding features.
            - name: Run seal and issuer integration tests
              run: |
                  cargo nextest run \
                    -p nectar-integration-tests --features seal,issuer --locked \
                    --no-tests=warn --no-fail-fast
            # The serde impls (and the bounded-newtype guards on their decode
            # path) are off the default build; cover their tests here.
            - name: Run postage serde tests
              run: |
                  cargo nextest run \
                    -p nectar-postage --features serde --locked \
                    --no-tests=warn --no-fail-fast
            # The encrypted node walk and its per-reference crypto sit behind
            # the encryption feature; cover its tests and doctest here.
            - name: Run manifest encryption tests
              run: |
                  cargo nextest run \
                    -p nectar-manifest --features encryption --locked \
                    --no-tests=warn --no-fail-fast
            - name: Run manifest encryption doctests
              run: cargo test --doc -p nectar-manifest --features encryption --locked

    wasm:
        # The postage-usage client facade is meant to run in a browser. The
        # thread pool (wasm-bindgen-rayon) is opt-in behind the primitives
        # `parallel` / `wasm-threads` features, so the crate builds for wasm32
        # single-threaded by default. A plain check on the default features is
        # therefore the faithful one.
        name: wasm / browser crates
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
            - uses: ./.github/actions/rust-setup
              with:
                  targets: wasm32-unknown-unknown
            - name: Check postage-usage builds for wasm32
              run: |
                  cargo check \
                    -p nectar-postage-usage --features client --locked \
                    --target wasm32-unknown-unknown
            - name: Check manifest builds for wasm32
              # The mantaray 1.0 manifest is memory-bounded and browser-facing,
              # so its default build must stay wasm32-clean.
              run: |
                  cargo check \
                    -p nectar-manifest --locked \
                    --target wasm32-unknown-unknown

    wasm-smoke:
        # Executable proof of the wasm store-trait relaxation: a !Send store
        # satisfies ChunkGet only on wasm32, so the smoke test must actually run
        # there. Executes under Node via wasm-bindgen-test-runner, which nextest
        # cannot host; hence a separate plain-cargo job. The runner version must
        # equal the locked wasm-bindgen version (kept in lockstep by the
        # workspace's exact wasm-bindgen-test pin).
        name: wasm / node smoke
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
            - uses: ./.github/actions/rust-setup
              with:
                  targets: wasm32-unknown-unknown
            - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
              with:
                  tool: wasm-bindgen@0.2.122
            - name: Run wasm smoke tests
              env:
                  CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
              run: |
                  cargo test \
                    -p nectar-testing --test wasm_smoke --locked \
                    --target wasm32-unknown-unknown

    unit-success:
        name: unit success
        runs-on: ubuntu-latest
        if: always()
        needs: [test, wasm, wasm-smoke]
        timeout-minutes: 30
        steps:
            - name: Decide whether the needed jobs succeeded or failed
              uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
