# Runs unit tests.
name: unit

on:
    pull_request:
    merge_group:
    push:
        branches: [main]

env:
    CARGO_TERM_COLOR: always

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    test:
        # name: test / ${{ matrix.type }} (${{ matrix.partition }}/${{ matrix.total_partitions }})
        name: test / ${{ matrix.type }}
        runs-on: ubuntu-latest
        env:
            RUST_BACKTRACE: 1
        strategy:
            matrix:
                include:
                    - type: swarm
                      args: ""
                    # - type: ethereum
                    #   args: --features "asm-keccak ethereum" --locked
                    #   partition: 1
                    #   total_partitions: 2
                    # - type: ethereum
                    #   args: --features "asm-keccak ethereum" --locked
                    #   partition: 2
                    #   total_partitions: 2
                    # - type: optimism
                    #   args: --features "asm-keccak optimism" --locked --exclude reth --exclude reth-bench --exclude "example-*" --exclude "reth-ethereum-*" --exclude "*-ethereum"
                    #   partition: 1
                    #   total_partitions: 2
                    # - type: optimism
                    #   args: --features "asm-keccak optimism" --locked --exclude reth --exclude reth-bench --exclude "example-*" --exclude "reth-ethereum-*" --exclude "*-ethereum"
                    #   partition: 2
                    #   total_partitions: 2
                    # - type: book
                    #   args: --manifest-path book/sources/Cargo.toml
                    #   partition: 1
                    #   total_partitions: 1
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
            - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
            - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
              with:
                  cache-on-failure: true
            - uses: taiki-e/install-action@1b57bc699ba2af96a06eb2a2a0d32b43a7d8e8b8  # nextest
            - if: "${{ matrix.type == 'book' }}"
              uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
            - name: Run tests
              run: |
                  cargo nextest run \
                    ${{ matrix.args }} --workspace \
                    --no-tests=warn \
                    -E "!kind(test)"

    doc:
        name: doc tests (${{ matrix.network }})
        runs-on: ubuntu-latest
        env:
            RUST_BACKTRACE: 1
        timeout-minutes: 30
        # strategy:
        #     matrix:
        #         network: ["ethereum", "optimism"]
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
            - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444  # v1
            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
            - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
              with:
                  cache-on-failure: true
            - name: Run doctests
              # run: cargo test --doc --workspace --features "${{ matrix.network }}"
              run: cargo test --doc --workspace

    unit-success:
        name: unit success
        runs-on: ubuntu-latest
        if: always()
        needs: [test]
        timeout-minutes: 30
        steps:
            - name: Decide whether the needed jobs succeeded or failed
              uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # release/v1
              with:
                  jobs: ${{ toJSON(needs) }}
